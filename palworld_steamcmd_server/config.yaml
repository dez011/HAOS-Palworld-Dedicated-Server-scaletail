name: Palworld Dedicated Server (SteamCMD)
slug: palworld_steamcmd_server-tailscale
description: Palworld Dedicated Server – Steam komplett unter /share, optional Tailscale
version: "1.4.0"
arch:
  - amd64

startup: application
boot: auto
init: false
host_network: false

# Ports are still exposed by default for LAN play.
# When Tailscale is enabled, players on your Tailnet can connect
# directly via the Tailscale IP/hostname – no port-forwarding needed.
ports:
  8211/udp: 8211
  27015/udp: 27015

ports_description:
  8211/udp: "Game Port (UDP)"
  27015/udp: "Query Port (UDP)"

# 🔴 NUR share – Steam + Server + Config liegen auf dem Host
map:
  - share:rw

# Tailscale needs TUN device and NET_ADMIN
privileged: false
devices:
  - /dev/net/tun
cap_add:
  - NET_ADMIN

options:
  app_id: 2394010
  steam_user: anonymous
  steam_pass: ""
  update_on_boot: true
  tailscale_enabled: false
  tailscale_authkey: ""
  tailscale_hostname: "st-palworld"
  tailscale_accept_dns: true
  tailscale_advertise_exit_node: false
  tailscale_funnel: false
  tailscale_state_dir: "/share/palworld/tailscale"

schema:
  app_id: int
  steam_user: str
  steam_pass: str?
  update_on_boot: bool
  tailscale_enabled: bool
  tailscale_authkey: str?
  tailscale_hostname: str?
  tailscale_accept_dns: bool?
  tailscale_advertise_exit_node: bool?
  tailscale_funnel: bool?
  tailscale_state_dir: str?
